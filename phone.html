<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYRO RACER — Controller</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:#0a0a0a; font-family:'Courier New',monospace; touch-action:none; user-select:none; overflow:hidden; }
body { display:flex; flex-direction:column; align-items:center; }
#arcWrap { flex:1; width:100%; display:flex; align-items:center; justify-content:center; }
#arcSvg { width:min(88vw,320px); height:min(88vw,320px); }
#statusBar { width:100%; padding:10px 16px; background:#111; border-top:2px solid #1a1a1a; display:flex; align-items:center; justify-content:space-between; }
.sbit { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.3); }
.sbit span { color:#FFD700; font-size:14px; display:block; margin-top:2px; }
#raceTag { display:none; font-size:9px; letter-spacing:3px; color:#00FF88; border:2px solid #00FF88; padding:4px 10px; }
#controls { width:100%; padding:10px 16px 18px; background:#111; border-top:2px solid #1a1a1a; display:flex; gap:8px; justify-content:center; }
.cb { background:rgba(255,255,255,0.05); color:#fff; border:2px solid rgba(255,255,255,0.18); font-family:'Courier New',monospace; font-size:11px; font-weight:bold; letter-spacing:1px; padding:10px 0; cursor:pointer; flex:1; max-width:130px; }
.cb:active { opacity:.7; }
.cb.y { border-color:#FFD700; color:#FFD700; }
.cb.g { border-color:#00FF88; color:#00FF88; }
#overlay { position:fixed; inset:0; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50; gap:14px; padding:24px; text-align:center; overflow-y:auto; }
#overlay h1 { color:#FFD700; font-size:clamp(22px,8vw,38px); font-weight:900; letter-spacing:5px; text-shadow:3px 3px 0 #000; line-height:1.2; margin-bottom:4px; }
.icard { background:rgba(255,255,255,0.04); border:2px solid rgba(255,255,255,0.12); padding:12px 14px; width:100%; max-width:300px; text-align:left; }
.icard label { color:rgba(255,255,255,0.4); font-size:9px; letter-spacing:3px; display:block; margin-bottom:7px; }
.icard input { width:100%; background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.18); color:#FFD700; font-family:'Courier New',monospace; font-size:12px; font-weight:bold; padding:9px 10px; outline:none; letter-spacing:1px; }
.icard input:focus { border-color:#FFD700; }
.icard input::placeholder { color:rgba(255,255,255,0.15); font-size:10px; font-weight:normal; }
#statusMsg { font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.35); min-height:16px; padding:6px 14px; border:2px solid rgba(255,255,255,0.1); width:100%; max-width:300px; text-align:center; }
#statusMsg.ok  { color:#00FF88; border-color:#00FF88; }
#statusMsg.err { color:#FF4400; border-color:#FF4400; }
.startBtn { background:#FFD700; color:#000; font-family:'Courier New',monospace; font-weight:900; font-size:14px; letter-spacing:3px; border:4px solid #000; padding:14px 0; cursor:pointer; box-shadow:4px 4px 0 #000; width:100%; max-width:300px; }
.startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }
#sensPanel { display:none; position:fixed; bottom:76px; left:50%; transform:translateX(-50%); background:#111; border:2px solid #FFD700; padding:16px 20px; z-index:60; width:240px; text-align:center; }
#axisPanel { display:none; position:fixed; bottom:76px; left:50%; transform:translateX(-50%); background:#111; border:2px solid #FFD700; padding:16px 20px; z-index:60; width:260px; text-align:center; }
input[type=range] { -webkit-appearance:none; width:100%; height:8px; background:#222; border:2px solid #333; outline:none; margin:8px 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; background:#FFD700; border:3px solid #000; cursor:pointer; }
.panelBtn { margin-top:10px; background:#FFD700; color:#000; font-family:'Courier New',monospace; font-weight:900; font-size:12px; letter-spacing:2px; border:3px solid #000; padding:8px 20px; cursor:pointer; }
.axOpt { width:100%; background:rgba(255,255,255,0.05); border:2px solid #333; color:#aaa; font-family:'Courier New',monospace; font-size:12px; letter-spacing:2px; padding:10px; cursor:pointer; margin-bottom:6px; }
.axOpt.active { background:rgba(255,215,0,0.15); border-color:#FFD700; color:#FFD700; }
</style>
</head>
<body>

<div id="overlay">
  <h1>🏎<br>GYRO<br>RACER</h1>
  <div id="statusMsg">TAP BELOW TO CONNECT</div>
  <button class="startBtn" id="connectBtn">▶ STEP 1 — CONNECT</button>
  <button class="startBtn" id="gyroBtn" style="display:none;background:#00FF88;margin-top:4px;">▶ STEP 2 — ENABLE GYRO</button>
</div>

<div id="arcWrap">
  <svg id="arcSvg" viewBox="0 0 300 300">
    <path d="M 30 200 A 140 140 0 0 1 270 200" fill="none" stroke="#1a1a1a" stroke-width="30" stroke-linecap="round"/>
    <path d="M 30 200 A 140 140 0 0 1 270 200" fill="none" stroke="#2a2a2a" stroke-width="18" stroke-linecap="round"/>
    <path id="arcFill" d="M 150 60" fill="none" stroke="#FFD700" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <line x1="150" y1="62" x2="150" y2="90" stroke="#333" stroke-width="3"/>
    <g id="needle" style="transform-origin:150px 200px;transition:transform 0.05s linear">
      <line x1="150" y1="200" x2="150" y2="70" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <circle cx="150" cy="200" r="11" fill="#FFD700" stroke="#000" stroke-width="3"/>
      <circle cx="150" cy="74" r="6" fill="#FFD700"/>
    </g>
    <text x="18" y="228" fill="#333" font-size="14" font-family="Courier New" font-weight="bold">◀</text>
    <text x="268" y="228" fill="#333" font-size="14" font-family="Courier New" font-weight="bold">▶</text>
    <text id="steerTxt" x="150" y="182" fill="#fff" font-size="24" font-weight="bold" font-family="Courier New" text-anchor="middle">0°</text>
    <text id="steerPct" x="150" y="235" fill="#444" font-size="10" font-family="Courier New" text-anchor="middle">CENTER</text>
  </svg>
</div>

<div id="statusBar">
  <div class="sbit">TILT<span id="tiltVal">—</span></div>
  <div id="raceTag">● LIVE</div>
  <div class="sbit" style="text-align:right">STEER<span id="steerPctHud">—</span></div>
</div>

<div id="controls">
  <button class="cb y" id="flipBtn">⇄ FLIP</button>
  <button class="cb g" id="calBtn">✦ RECAL</button>
  <button class="cb"   id="axisBtn">↻ AXIS</button>
  <button class="cb"   id="settBtn">⚙ SENS</button>
</div>

<div id="axisPanel">
  <div style="color:#FFD700;font-size:11px;letter-spacing:2px;margin-bottom:12px">TILT AXIS</div>
  <button class="axOpt active" data-axis="gamma">GAMMA — left/right tilt ✓</button>
  <button class="axOpt" data-axis="beta">BETA — forward/back tilt</button>
  <button class="axOpt" data-axis="alpha">ALPHA — compass rotate</button>
  <button class="panelBtn" onclick="document.getElementById('axisPanel').style.display='none'">✓ DONE</button>
</div>

<div id="sensPanel">
  <div style="color:#FFD700;font-size:11px;letter-spacing:2px;margin-bottom:4px">SENSITIVITY</div>
  <input type="range" id="sensSlider" min="8" max="60" value="28" step="2">
  <div style="color:#FFD700;font-size:16px;font-weight:bold" id="sensLbl">28°</div>
  <button class="panelBtn" onclick="document.getElementById('sensPanel').style.display='none'">✓ DONE</button>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// ── SAME KEY AS tv.html ─────────────────────────────────────────────────────
const ABLY_KEY = 'PASTE_ABLY_API_KEY_HERE';
// ─────────────────────────────────────────────────────────────────────────────
const G = { axis:'gamma', invert:false, flip:false, sens:28, dz:4, base:null };
let rawAlpha=0, rawBeta=0, rawGamma=0, gyroLive=false;
let ablyChannel = null;

function setStatus(msg, cls) {
  const e = document.getElementById('statusMsg');
  e.textContent = msg;
  e.className = cls || '';
}

// ── GYRO ──────────────────────────────────────────────────────────────────────
function getRaw() { return G.axis==='gamma' ? rawGamma : G.axis==='beta' ? rawBeta : rawAlpha; }

function computeSteer() {
  let raw=getRaw(), base=G.base!==null ? G.base : raw, delta=raw-base;
  if (G.axis==='alpha') { if (delta>180) delta-=360; if (delta<-180) delta+=360; }
  const dz=G.dz;
  if (Math.abs(delta)<dz) delta=0; else delta-=Math.sign(delta)*dz;
  let v = delta / Math.max(1, G.sens-dz);
  v = Math.max(-1, Math.min(1, v));
  if (G.invert) v=-v;
  if (G.flip)   v=-v;
  return v;
}

// ── SEND TO ABLY ──────────────────────────────────────────────────────────────
let lastSendTime = 0, lastSentSteer = null, sendPending = false;

function sendGyro() {
  if (!ablyChannel) return;
  const now = Date.now();
  const steer = parseFloat(computeSteer().toFixed(3));
  // Skip if steer hasn't changed meaningfully
  if (lastSentSteer !== null && Math.abs(steer - lastSentSteer) < 0.005) return;
  // Throttle to max 50ms between sends (~20 msg/sec — well within Ably's 50/sec limit)
  if (now - lastSendTime < 50) {
    if (!sendPending) {
      sendPending = true;
      setTimeout(() => { sendPending = false; sendGyro(); }, 50 - (now - lastSendTime));
    }
    return;
  }
  lastSentSteer = steer;
  lastSendTime = now;
  ablyChannel.publish('gyro', { steer }).catch(() => {});
}

function onOrient(e) {
  rawAlpha=e.alpha||0; rawBeta=e.beta||0; rawGamma=e.gamma||0;
  if (!gyroLive) { gyroLive=true; if (G.base===null) G.base=getRaw(); }
  updateUI();
  sendGyro();
}

function updateUI() {
  const raw=getRaw(), steer=computeSteer(), deg=steer*88;
  document.getElementById('needle').style.transform = 'rotate('+deg+'deg)';
  const R=140, cx=150, cy=200, sa=-Math.PI/2, ea=sa+steer*Math.PI/2;
  const x1=cx+R*Math.cos(sa), y1=cy+R*Math.sin(sa);
  const x2=cx+R*Math.cos(ea), y2=cy+R*Math.sin(ea);
  const arcFill = document.getElementById('arcFill');
  if (Math.abs(steer) < 0.02) {
    arcFill.setAttribute('d', 'M '+x1+' '+y1);
  } else {
    arcFill.setAttribute('d', 'M '+x1+' '+y1+' A '+R+' '+R+' 0 0 '+(steer>0?1:0)+' '+x2+' '+y2);
  }
  arcFill.setAttribute('stroke', steer<0 ? '#FF6644' : '#FFD700');
  document.getElementById('steerTxt').textContent = raw.toFixed(0)+'°';
  const pct = Math.round(Math.abs(steer)*100);
  document.getElementById('steerPct').textContent = steer===0 ? 'CENTER' : ((steer<0?'◀ ':'')+pct+'%'+(steer>0?' ▶':''));
  document.getElementById('tiltVal').textContent = raw.toFixed(1)+'°';
  document.getElementById('steerPctHud').textContent = (steer*100).toFixed(0)+'%';
}

// ── CONNECT ───────────────────────────────────────────────────────────────────
document.getElementById('connectBtn').addEventListener('click', () => {
  const key = ABLY_KEY;
  if (!key || !key.includes(':')) { setStatus('✖ ABLY_KEY is invalid — check phone.html', 'err'); return; }
  setStatus('CONNECTING...', '');

  const ably = new Ably.Realtime({ key, recover: true });

  ably.connection.once('connected', () => {
    ablyChannel = ably.channels.get('gyro-racer');
    document.getElementById('raceTag').style.display = 'block';

    // iOS requires a separate direct user tap to enable motion sensors
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      setStatus('✓ CONNECTED — TAP STEP 2 TO ENABLE GYRO', 'ok');
      document.getElementById('connectBtn').style.display = 'none';
      document.getElementById('gyroBtn').style.display = 'block';
    } else {
      // Android / desktop — gyro works without permission
      window.addEventListener('deviceorientation', onOrient);
      setStatus('✓ CONNECTED — TILT TO STEER', 'ok');
      document.getElementById('overlay').style.display = 'none';
    }
  });

  ably.connection.once('failed', () => {
    setStatus('✖ CONNECTION FAILED — CHECK YOUR ABLY KEY', 'err');
  });
});

// iOS gyro permission — MUST be triggered by a direct synchronous user tap
document.getElementById('gyroBtn').addEventListener('click', () => {
  DeviceOrientationEvent.requestPermission()
    .then(state => {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', onOrient);
        document.getElementById('overlay').style.display = 'none';
      } else {
        setStatus('⚠ GYRO DENIED — SETTINGS → SAFARI → MOTION ACCESS', 'err');
      }
    })
    .catch(err => setStatus('✖ ' + err.message, 'err'));
});

// ── CONTROLS ─────────────────────────────────────────────────────────────────
document.getElementById('flipBtn').addEventListener('click', () => {
  G.flip = !G.flip;
  const b = document.getElementById('flipBtn');
  b.textContent = G.flip ? '⇄ ON' : '⇄ FLIP';
  b.style.color = G.flip ? '#00FF88' : '#FFD700';
  b.style.borderColor = G.flip ? '#00FF88' : '#FFD700';
});

document.getElementById('calBtn').addEventListener('click', () => {
  G.base = getRaw();
  const b = document.getElementById('calBtn'), o = b.textContent;
  b.textContent = '✦ SET!';
  setTimeout(() => b.textContent = o, 900);
});

document.getElementById('settBtn').addEventListener('click', () => {
  const p = document.getElementById('sensPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  document.getElementById('axisPanel').style.display = 'none';
});

document.getElementById('axisBtn').addEventListener('click', () => {
  const p = document.getElementById('axisPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  document.getElementById('sensPanel').style.display = 'none';
});

document.getElementById('sensSlider').addEventListener('input', function() {
  G.sens = +this.value;
  document.getElementById('sensLbl').textContent = G.sens + '°';
});

document.querySelectorAll('.axOpt').forEach(btn => {
  btn.addEventListener('click', () => {
    G.axis = btn.dataset.axis;
    G.base = null;
    document.querySelectorAll('.axOpt').forEach(b => {
      b.className = 'axOpt';
      b.textContent = b.textContent.replace(' ✓', '');
    });
    btn.className = 'axOpt active';
    btn.textContent = btn.textContent + ' ✓';
    document.getElementById('axisPanel').style.display = 'none';
  });
});

// ── WAKE LOCK — keeps screen on, re-acquires after tab switch / background ────
let _wl = null;
async function keepAwake() {
  if (!('wakeLock' in navigator)) return;
  try { _wl = await navigator.wakeLock.request('screen'); } catch(e) {}
}
keepAwake();
// Wake Lock is automatically released when the page goes to background.
// Re-request it every time the page becomes visible again.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});
// Belt-and-suspenders: re-request every 25 seconds in case it silently dropped
setInterval(() => { if (document.visibilityState === 'visible' && (!_wl || _wl.released)) keepAwake(); }, 25000);
</script>
</body>
</html>
